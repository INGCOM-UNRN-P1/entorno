<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" />
      <stop offset="100%" stop-color="#16a34a" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Fondo -->
  <rect width="100%" height="100%" fill="url(#bgGrad)"/>
  
  <!-- Título -->
  <text x="400" y="40" font-family="'Outfit', 'Inter', sans-serif" font-size="22" font-weight="bold" fill="#f8fafc" text-anchor="middle">
    FLUJO DE COMPILACIÓN CON GCC (MinGW-w64 UCRT64)
  </text>
  
  <!-- Código Fuente -->
  <rect x="40" y="180" width="110" height="70" rx="6" fill="#334155" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="215" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#f1f5f9" text-anchor="middle">Código Fuente</text>
  <text x="95" y="235" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">.c / .cpp</text>
  
  <!-- Preprocesador y Compilador -->
  <rect x="190" y="150" width="130" height="130" rx="8" fill="url(#orangeGrad)" filter="url(#shadow)"/>
  <text x="255" y="185" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Compilador</text>
  <text x="255" y="205" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ffe5d9" text-anchor="middle">gcc / cc1</text>
  <text x="255" y="235" font-family="'Inter', sans-serif" font-size="11" fill="#ffd8c6" text-anchor="middle">Preprocesamiento</text>
  <text x="255" y="250" font-family="'Inter', sans-serif" font-size="11" fill="#ffd8c6" text-anchor="middle">y Análisis de Código</text>
  
  <!-- Código Ensamblador -->
  <rect x="360" y="180" width="110" height="70" rx="6" fill="#1e293b" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <text x="415" y="215" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#38bdf8" text-anchor="middle">Ensamblador</text>
  <text x="415" y="235" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Código (.s)</text>
 
  <!-- Ensamblador y Enlazador -->
  <rect x="510" y="150" width="130" height="130" rx="8" fill="url(#blueGrad)" filter="url(#shadow)"/>
  <text x="575" y="180" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Enlazador</text>
  <text x="575" y="195" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#e0f2fe" text-anchor="middle">as / ld</text>
  <line x1="530" y1="210" x2="620" y2="210" stroke="#0284c7" stroke-width="1"/>
  <text x="575" y="230" font-family="'Inter', sans-serif" font-size="11" fill="#e0f2fe" text-anchor="middle">Generación de Objeto</text>
  <text x="575" y="245" font-family="'Inter', sans-serif" font-size="11" fill="#e0f2fe" text-anchor="middle">(.o) y Enlace con</text>
  <text x="575" y="260" font-family="'Inter', sans-serif" font-size="11" fill="#e0f2fe" text-anchor="middle">Librerías UCRT</text>
 
  <!-- Ejecutable -->
  <rect x="680" y="180" width="100" height="70" rx="6" fill="url(#greenGrad)" filter="url(#shadow)"/>
  <text x="730" y="210" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Ejecutable</text>
  <text x="730" y="230" font-family="'Inter', sans-serif" font-size="12" font-weight="bold" fill="#ecfdf5" text-anchor="middle">.exe / .dll</text>
  <text x="730" y="245" font-family="'Inter', sans-serif" font-size="10" fill="#d1fae5" text-anchor="middle">(Nativo Windows)</text>
 
  <!-- Flechas de Flujo -->
  <path d="M 150 215 L 180 215" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 320 215 L 350 215" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <path d="M 470 215 L 500 215" stroke="#0284c7" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <path d="M 640 215 L 670 215" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#94a3b8" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#0284c7" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#16a34a" />
    </marker>
  </defs>
</svg>
